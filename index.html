<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sand:       #f5ede0;
            --parchment:  #eedfc8;
            --clay:       #c8825a;
            --terracotta: #a0522d;
            --earth:      #6b3a22;
            --ink:        #2c1a0e;
            --gold:       #c49a3c;
            --cream:      #fdf6ee;
        }

        body {
            background-color: #c2b280;
            font-family: Georgia, serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 1100px; /* bigger */
            border: 3px solid var(--parchment);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 30px rgba(44, 26, 14, 0.2);
        }

        .card-header {
            background-color: var(--terracotta);
            border-bottom: 3px solid var(--gold);
            padding: 24px;
            text-align: center;
        }

        .card-header h1 {
            font-size: 1.8rem; /* slightly larger title */
            color: var(--cream);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .card-body {
            display: flex;
            min-height: 320px; /* taller body */
        }

        .sidebar {
            background-color: var(--earth);
            width: 240px;
            flex-shrink: 0;
            padding: 36px 28px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            border-right: 3px solid var(--gold);
        }

        .sidebar a {
            text-decoration: none;
            color: var(--parchment);
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            transition: color 0.2s;
        }

        .sidebar a:hover {
            color: var(--gold);
            background-color: #fdf6ee;
            padding: 2px;
        }

        .main {
            background-color: var(--clay);
            flex: 1;
            padding: 44px 48px;
        }

        .main h2 {
            color: var(--cream);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .main p {
            color: var(--cream);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .card-footer {
            background-color: var(--gold);
            border-top: 3px solid var(--terracotta);
            padding: 18px;
            text-align: center;
        }

        .card-footer p {
            color: var(--ink);
            font-size: 0.95rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">

        <div class="card-header">
            <h1>Welcome to CA252</h1>
        </div>

        <div class="card-body">

            <div class="sidebar">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">News</a>
                <a href="#">Contact</a>
            </div>

            <div class="main">
                <h2>Welcome to Admin page</h2>
                <p>You are using the System</p>
                <p>Do not share your email and password to any</p>
            </div>

        </div>

        <div class="card-footer">
            <p>All Copyright received by CA252</p>
        </div>

    </div>

</body>
</html>
